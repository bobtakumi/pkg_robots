# pkg_robots 設定（実装プラン §1.1）
[vault]
path = "/Users/bobtk/pkg_vault"
# インデックス対象から除外するパス（前方一致 or パス断片）
exclude_prefixes = ["_depot/", "9_Templates/", "plan/", "_Reports/", ".obsidian/", ".trash/"]
exclude_fragments = ["/Assets/"]

[index]
db_path = "data/garden.db"
stats_path = "data/stats.json"
# 日本語+markdown はトークン膨張が激しい（実測: 3450字が bge-m3 の 8192tok を超過）。
# 節ノート中央値 2.3k字 → 2000字は粒度として妥当
chunk_max_chars = 2000

[embed]
# 【O1 決着 2026-07-04】埋め込みは MBP（M3 Max・128GB）でホスト。DGX は判定専用（--embeddings なし=501）。
# 想定配置: pkg_robots 本体も MBP で稼働 → 埋め込みは MBP ローカル（localhost）、判定は DGX へ。
#   pkg_robots を Neo 等の別マシンで動かす場合のみ endpoint を "http://<MBPのホスト名>:11434" に変える。
# 現 data/garden.db は Neo プロトタイプの bge-m3-8k で構築済み。MBP 移設後に再インデックスで再現する。
# 不達なら埋め込みパスは自動スキップ。
# O2 決着（2026-07-03）: bge-m3-8k 採用（recall@10=51.1% / @30=63.8%。ruri-large 25.5% に優越）
endpoint = "http://localhost:11434"
# 非対称モデル用 prefix（ruri 等）。bge-m3 は不要なので空
model = "bge-m3-8k"
query_prefix = ""
passage_prefix = ""

[judge]
# DGX Spark 上の llama.cpp llama-server（OpenAI 互換 /v1、認証なし）。2026-07-04 実測確定。
# thinking モデルだが llama.cpp は推論を reasoning_content に分離し content は素の JSON を返す。
endpoint = "http://spark-062c.local:11434/v1"
model = "llm-jp-4-32b-a3b-thinking-Q4_K_M.gguf"

[candidates]
# 実測（gold=6/26 レポート確度高47件）: recall@10=51.1% / recall@30=63.8%。
# 候補段は recall 重視で 30 に設定し、絞り込みは judge（M3）が担う。
# 残る深い miss（語彙が重ならない概念的接続 ≈36%）は Phase 2 GraphRAG / ハイブリッド検索の領域
top_k = 30
min_similarity = 0.45
